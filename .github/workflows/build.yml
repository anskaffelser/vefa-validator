name: Build

on:
  push:
    branches:
      - main
  release:
    types:
      - published
  workflow_dispatch:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    strategy:
      matrix:
        jdk: [21]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare version labels
        uses: k15g/action-version-labels@edge
        with:
          prefix: project

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up JDK ${{ matrix.jdk }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.jdk }}
          distribution: temurin

      - name: Build with Maven
        run: mvn -B --no-transfer-progress package

      - name: Docker login
        uses: docker/login-action@v3
        if: matrix.jdk == 21
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build Docker image
        run: make docker_build tag=dev
        if: matrix.jdk == 21

      - name: Push edge images
        if: "matrix.jdk == 21 && !startsWith(github.ref, 'refs/tags/')"
        run: make docker_push tag=edge

      - name: Push images
        if: "matrix.jdk == 21 && startsWith(github.ref, 'refs/tags/')"
        run: |
          make docker_push tag=${{ env.PROJECT_VERSION }}
          make docker_push tag=latest
